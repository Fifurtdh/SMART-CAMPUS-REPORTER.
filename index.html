  </style>

// Start realtime listener — ALL phones see updates instantly
function startListener(){
  try{
    _supabase
      .channel("complaints-channel")
      .on("postgres_changes",{event:"*",schema:"public",table:"complaints"},()=>{
        loadAllComplaints();
      })
      .subscribe();
    loadAllComplaints();
  }catch(e){ console.warn("Supabase listener error",e); }
}

async function loadAllComplaints(){
  try{
    const {data,error} = await _supabase
      .from("complaints")
      .select("*")
      .order("submitted_at_ms",{ascending:false});
    if(!error && data){
      S.complaints = data.map(r=>({
        id: "CPR-"+String(r.id).slice(-4).padStart(4,"0"),
        docId: r.id,
        role: r.role, name: r.name, contact: r.contact,
        location: r.location, category: r.category,
        description: r.description, urgency: r.urgency,
        priority: r.priority, summary: r.summary,
        assignDept: r.assign_dept, estimatedTime: r.estimated_time,
        safetyNote: r.safety_note, status: r.status,
        submittedAt: r.submitted_at, updatedAt: r.updated_at,
        replies: r.replies || []
      }));
      draw();
    }
  }catch(e){ console.warn("Load error",e); }
}

async function fbAdd(data){
  const {data:row,error} = await _supabase.from("complaints").insert([{
    role: data.role, name: data.name, contact: data.contact,
    location: data.location, category: data.category,
    description: data.description, urgency: data.urgency,
    priority: data.priority, summary: data.summary,
    assign_dept: data.assignDept, estimated_time: data.estimatedTime,
    safety_note: data.safetyNote, status: "open",
    submitted_at: data.submittedAt, updated_at: data.updatedAt,
    submitted_at_ms: data.submittedAtMs, replies: []
  }]).select();
  if(error) throw error;
  return row[0];
}

async function fbUpdate(docId, data){
  const update = {};
  if(data.status)      update.status      = data.status;
  if(data.assignDept)  update.assign_dept  = data.assignDept;
  if(data.updatedAt)   update.updated_at   = data.updatedAt;
  if(data.replies)     update.replies      = data.replies;
  const {error} = await _supabase.from("complaints").update(update).eq("id",docId);
  if(error) throw error;
}

// ════════════════════════════════════════════════════════════
//  AI ANALYSIS
// ════════════════════════════════════════════════════════════
async function callAI(form){
  const fallback={priority:"medium",summary:form.desc.slice(0,80),assignDept:"Admin Office",estimatedTime:"2-3 days",safetyNote:""};
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:400,
        messages:[{role:"user",content:
          `Campus complaint. JSON only, no markdown.\nCategory:${form.category}, Location:${form.location}, Description:${form.desc}, Urgency:${form.urgency||"not stated"}\nFields: priority(low/medium/high/critical), summary(1 sentence), assignDept(one of:Electrical Dept,Civil / Maintenance,Housekeeping,IT Department,Hostel Management,Admin Office,Security), estimatedTime(e.g."1-2 days"), safetyNote(or "")`
        }]
      })
    });
    const d=await res.json();
    const txt=(d.content||[]).map(i=>i.text||"").join("");
    return {...fallback,...JSON.parse(txt.replace(/```json|```/g,"").trim())};
  }catch(e){return fallback;}
}

function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="cls")e.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const k of kids.flat(9)){
    if(k==null||k===false)continue;
    e.appendChild(typeof k==="string"||typeof k==="number"?document.createTextNode(String(k)):k);
  }
  return e;
}

function pill(label,color,bg,big){
  return h("span",{cls:big?"pill2":"pill",style:{color,borderColor:color,background:bg}},label);

function sbox(label,value,color){

    h("div",{style:{fontSize:"10px",color:"var(--muted)",letterSpacing:"2px",marginTop:"2px",fontFamily:"'Space Mono',monospace"}},label.toUpperCase())

}
function irow(label,value,color){

    h("div",{style:{textAlign:"center",padding:"32px 0 24px"}},

      h("h1",{style:{fontSize:"24px",fontWeight:"800",color:"var(--accent)",margin:"0 0 10px",fontFamily:"'Space Mono',monospace",letterSpacing:"1px"}},
        "Campus Complaint Portal"),
      h("p",{style:{fontSize:"13px",color:"var(--muted)",letterSpacing:"2px"}},
        "Report · Track · Resolve"),
      h("div",{style:{marginTop:"12px",display:"flex",justifyContent:"center"}},
        h("span",{cls:"live-badge"},
          h("span",{cls:"live-dot"}),
          "LIVE — All phones synced"
        )
      )
    ),

    // Stats
    h("div",{cls:"g3"},
      sbox("Open",open,"#EF4444"),
      sbox("In Progress",prog,"#F59E0B"),
      sbox("Resolved",done,"#10B981")
    ),

    // Nav cards
    h("div",{cls:"gcards"},
      navCard("📝","Submit Complaint",   "Report a problem on campus",        "#2563EB","submit"),
      navCard("🔍","Track Complaint",    "Check your ticket status",          "#7C3AED","track"),
      navCard("🛡️","Admin / Management","View & manage all complaints",       "#065F46","pingate")
    )
  );
}

// ════════════════════════════════════════════════════════════
//  VIEW: SUBMIT
// ════════════════════════════════════════════════════════════
function pageSubmit(){
  if(S.ticket){
    const t=S.ticket;
    const p=PRIORITY[t.priority]||PRIORITY.medium;
    return h("div",{cls:"page"},
      h("div",{cls:"scard"},
        h("div",{style:{fontSize:"56px",marginBottom:"12px"}},"✅"),
        h("div",{style:{fontSize:"24px",fontWeight:"700",color:"var(--green)",marginBottom:"8px"}})  ,
        h("div",{style:{fontSize:"14px",color:"var(--muted)",marginBottom:"22px"}},"Save your Ticket ID to track status"),
        h("div",{cls:"tbadge"},t.id),
        h("div",{style:{margin:"20px 0",display:"grid",gap:"10px"}},
          irow("Priority",p.label,p.color),
          irow("Assigned To",t.assignDept),
          irow("Est. Time",t.estimatedTime),
          t.safetyNote?irow("⚠️ Safety",t.safetyNote,"#EF4444"):null
        ),
        h("div",{style:{fontSize:"13px",color:"var(--green)",marginBottom:"16px",padding:"10px",background:"#10B98122",borderRadius:"10px"}},
          "✅ Complaint saved to cloud! Management can see it now."
        ),
        h("div",{style:{display:"flex",gap:"12px",justifyContent:"center"}},
          h("button",{cls:"btn-out",onClick:()=>set({ticket:null,role:"",name:"",contact:"",location:"",category:"",desc:"",urgency:""})},"Submit Another"),
          h("button",{cls:"btn",onClick:()=>set({view:"home",ticket:null})},"🏠 Home")
        )
      )
    );
  }

  const valid=S.role&&S.name&&S.location&&S.category&&S.desc.trim().length>10;

  const nameInp=h("input",{cls:"inp",type:"text",placeholder:"Your full name",value:S.name});
  nameInp.addEventListener("input",e=>{S.name=e.target.value;});
  const ctcInp=h("input",{cls:"inp",type:"text",placeholder:"Phone / Email (optional)",value:S.contact});
  ctcInp.addEventListener("input",e=>{S.contact=e.target.value;});

  const locSel=h("select",{cls:"inp"},
    h("option",{value:""},"Select location..."),
    ...LOCATIONS.map(l=>{const o=h("option",{value:l},l);if(S.location===l)o.selected=true;return o;})
  );
  locSel.addEventListener("change",e=>{S.location=e.target.value;draw();});

  const descTA=h("textarea",{cls:"inp",rows:"4",placeholder:"Explain clearly... (min. 10 characters)"},S.desc);
  descTA.addEventListener("input",e=>{S.desc=e.target.value;});

  const success=h("div",{cls:"scard"});
  success.querySelector("div:nth-child(2)")?.remove?.();

  const submitLbl = S.submitting ? "⚙️ Saving to cloud..." : "🚀  Submit Complaint";

  return h("div",{cls:"page"},
    hdr("Submit Complaint",()=>set({view:"home"})),

    h("div",{style:{marginBottom:"20px"}},
      sec("WHO ARE YOU?"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}},
        ...ROLES.map(r=>h("button",{
          cls:"rbtn",
          style:{borderColor:S.role===r.id?"#2563EB":"var(--border)",background:S.role===r.id?"#2563EB22":"var(--card2)",color:S.role===r.id?"var(--accent)":"var(--muted)"},
          onClick:()=>{S.role=r.id;draw();}
        },
          h("span",{style:{fontSize:"26px"}},r.icon),
          h("span",{style:{fontSize:"13px"}},r.label)
        ))
      )
    ),

    h("div",{style:{marginBottom:"20px"}},
      sec("YOUR DETAILS"),
      h("div",{cls:"g2"},
        h("div",{},h("label",{cls:"lbl"},"NAME *"),nameInp),
        h("div",{},h("label",{cls:"lbl"},"CONTACT (OPTIONAL)"),ctcInp)
      )
    ),

    h("div",{style:{marginBottom:"20px"}},
      sec("ISSUE DETAILS"),
      h("div",{},h("label",{cls:"lbl"},"LOCATION *"),locSel),
      h("div",{style:{marginTop:"12px"}},
        h("label",{cls:"lbl"},"CATEGORY *"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}},
          ...CATEGORIES.map(c=>{
            const active=S.category===c.id;
            return h("button",{cls:"cbtn",
              style:{borderColor:active?c.color:"var(--border)",background:active?c.color+"22":"var(--card2)",color:active?c.color:"var(--muted)",boxShadow:active?`0 0 12px ${c.color}44`:"none"},
              onClick:()=>{S.category=c.id;draw();}
            },
              h("div",{style:{fontSize:"20px"}},c.icon),
              h("div",{style:{fontSize:"10px",marginTop:"4px"}},c.label)
            );
          })
        )
      ),
      h("div",{style:{marginTop:"12px"}},h("label",{cls:"lbl"},"DESCRIBE THE PROBLEM *"),descTA),
      h("div",{style:{marginTop:"12px"}},
        h("label",{cls:"lbl"},"URGENCY"),
        h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},
          ...["low","medium","high","critical"].map(u=>{
            const active=S.urgency===u;
            return h("button",{cls:"ubtn",
              style:{borderColor:active?PRIORITY[u].color:"var(--border)",background:active?PRIORITY[u].bg:"var(--card2)",color:active?PRIORITY[u].color:"var(--muted)"},
              onClick:()=>{S.urgency=u;draw();}
            },u);
          })
        )
      )
    ),

    h("button",{
      cls:"btn-full", disabled:!valid||S.submitting,
      onClick:async()=>{
        if(!valid||S.submitting)return;
        set({submitting:true});
        const ai=await callAI(S);
        const now=new Date();
        const ticket={
          id:"CPR-"+(1000+Math.floor(Math.random()*9000)),
          role:S.role, name:S.name, contact:S.contact,
          location:S.location, category:S.category,
          description:S.desc, urgency:S.urgency,
          ...ai, status:"open",
          submittedAt:now.toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}),
          submittedAtMs:now.getTime(),
          updatedAt:now.toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}),
          replies:[]
        };
        try{
          const ref=await fbAdd(ticket);
          ticket.docId=ref.id;
          toast("✅ Complaint submitted & saved to cloud!");
        }catch(e){
          toast("⚠️ Saved locally. Check internet connection.","err");
        }
        set({submitting:false,ticket,role:"",name:"",contact:"",location:"",category:"",desc:"",urgency:""});
      }
    },submitLbl)
  );
}

// ════════════════════════════════════════════════════════════
//  VIEW: TRACK
// ════════════════════════════════════════════════════════════
function pageTrack(){
  const found=S.trackQ.trim().length>2
    ?S.complaints.filter(c=>c.id.toLowerCase().includes(S.trackQ.toLowerCase())||(c.name||"").toLowerCase().includes(S.trackQ.toLowerCase()))
    :[];
  const inp=h("input",{cls:"inp",type:"text",placeholder:"Enter Ticket ID e.g. CPR-4521 or your name…",value:S.trackQ,style:{fontSize:"15px",textAlign:"center",letterSpacing:"2px",fontFamily:"'Space Mono',monospace"}});
  inp.addEventListener("input",e=>set({trackQ:e.target.value}));
  return h("div",{cls:"page"},
    hdr("Track Complaint",()=>set({view:"home"})),
    h("div",{cls:"card",style:{textAlign:"center",padding:"20px"}},
      h("div",{style:{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}},"Enter your Ticket ID or Name"),
      inp,
      h("div",{cls:"live-badge",style:{marginTop:"12px",display:"inline-flex"}},
        h("span",{cls:"live-dot"}),
        "Searching live cloud data"
      )
    ),
    S.trackQ.trim().length>2&&found.length===0?h("div",{cls:"empty"},"😕 No complaint found. Check your Ticket ID."):null,
    ...found.map(c=>ccard(c,false,null))
  );
}

// ════════════════════════════════════════════════════════════
//  VIEW: PIN GATE
// ════════════════════════════════════════════════════════════
function pagePinGate(){
  function tryUnlock(){
    if(S.pin===ADMIN_PIN)set({adminOK:true,view:"admin",pinErr:false,pin:""});
    else set({pinErr:true,pin:""});
  }
  const inp=h("input",{type:"password",cls:"inp",maxlength:"4",placeholder:"••••",value:S.pin,
    style:{textAlign:"center",fontSize:"28px",letterSpacing:"10px",width:"160px",fontFamily:"'Space Mono',monospace"}});
  inp.addEventListener("input",e=>{S.pin=e.target.value;});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});
  return h("div",{cls:"page"},
    hdr("Management Access",()=>set({view:"home"})),
    h("div",{cls:"pinbox"},
      h("div",{style:{fontSize:"48px",marginBottom:"14px"}},"🔐"),
      h("div",{style:{fontSize:"18px",color:"var(--accent)",marginBottom:"8px",fontWeight:"700"}},"Admin / Management Login"),
      h("div",{style:{fontSize:"13px",color:"var(--muted)",marginBottom:"22px"}},"Enter your 4-digit PIN"),
      inp,
      S.pinErr?h("div",{style:{color:"var(--red)",fontSize:"13px",marginTop:"10px"}},"❌ Wrong PIN. Try again."):null,
      h("div",{style:{marginTop:"18px"}},h("button",{cls:"btn",onClick:tryUnlock},"Enter  →")),
      h("div",{style:{fontSize:"11px",color:"#37474F",marginTop:"22px",fontFamily:"'Space Mono',monospace"}},"Default PIN: 1234  (change ADMIN_PIN in code)")
    )
  );
}

// ════════════════════════════════════════════════════════════
//  VIEW: ADMIN DASHBOARD
// ════════════════════════════════════════════════════════════
function pageAdmin(){
  if(S.sel)return pageDetail();
  const cs=S.complaints;
  const filtered=cs
    .filter(c=>S.aFilter==="all"||c.status===S.aFilter||c.priority===S.aFilter)
    .filter(c=>!S.aSearch||c.id.includes(S.aSearch)||(c.location||"").toLowerCase().includes(S.aSearch.toLowerCase())||(c.name||"").toLowerCase().includes(S.aSearch.toLowerCase())||(c.category||"").toLowerCase().includes(S.aSearch.toLowerCase()));
  const counts={total:cs.length,open:cs.filter(c=>c.status==="open").length,prog:cs.filter(c=>c.status==="in_progress").length,res:cs.filter(c=>c.status==="resolved").length};
  const srch=h("input",{cls:"inp",type:"text",placeholder:"🔍 Search ID, name, location, category...",value:S.aSearch,style:{marginBottom:"12px"}});
  srch.addEventListener("input",e=>set({aSearch:e.target.value}));
  return h("div",{cls:"page"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px",flexWrap:"wrap",gap:"10px"}},
      h("div",{},
        h("div",{style:{fontSize:"11px",color:"var(--muted)",letterSpacing:"3px",fontFamily:"'Space Mono',monospace"}},"MANAGEMENT"),
        h("div",{style:{fontSize:"22px",fontWeight:"800",color:"var(--accent)",fontFamily:"'Space Mono',monospace"}},"All Complaints")
      ),
      h("div",{style:{display:"flex",gap:"10px",alignItems:"center"}},
        h("span",{cls:"live-badge"},h("span",{cls:"live-dot"}),"LIVE"),
        h("button",{cls:"btn-out",style:{color:"var(--red)",borderColor:"#EF444466",fontSize:"13px",padding:"8px 16px"},
          onClick:()=>set({adminOK:false,view:"home"})},"🚪 Logout")
      )
    ),
    h("div",{cls:"g4"},
      sbox("Total",counts.total,"#93C5FD"),
      sbox("Open",counts.open,"#EF4444"),
      sbox("In Prog",counts.prog,"#F59E0B"),
      sbox("Resolved",counts.res,"#10B981")
    ),
    srch,
    h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"16px",overflowX:"auto",paddingBottom:"4px"}},
      ...["all","open","in_progress","resolved","critical","high"].map(f=>
        h("button",{cls:"fbtn"+(S.aFilter===f?" on":""),onClick:()=>set({aFilter:f})},f.replace("_"," "))
      )
    ),
    filtered.length===0?h("div",{cls:"empty"},"No complaints found."):h("div",{},...filtered.map(c=>ccard(c,true,()=>set({sel:c,dStatus:c.status,dDept:c.assignDept||"",dReply:""}))))
  );
}

// ════════════════════════════════════════════════════════════
//  VIEW: COMPLAINT DETAIL
// ════════════════════════════════════════════════════════════
function pageDetail(){
  const c=S.sel;
  const p=PRIORITY[c.priority]||PRIORITY.medium;
  const s=STATUS[c.status]||STATUS.open;
  const cat=CATEGORIES.find(x=>x.id===c.category);

  const stSel=h("select",{cls:"inp"});
  Object.entries(STATUS).forEach(([k,v])=>{const o=h("option",{value:k},v.icon+" "+v.label);if(S.dStatus===k)o.selected=true;stSel.appendChild(o);});
  stSel.addEventListener("change",e=>{S.dStatus=e.target.value;});

  const dpSel=h("select",{cls:"inp"},h("option",{value:""},"Select department..."));
  DEPARTMENTS.forEach(d=>{const o=h("option",{value:d},d);if(S.dDept===d)o.selected=true;dpSel.appendChild(o);});
  dpSel.addEventListener("change",e=>{S.dDept=e.target.value;});

  const repTA=h("textarea",{cls:"inp",rows:"3",placeholder:"Type reply to student / staff...",style:{resize:"vertical",marginBottom:"10px"}},S.dReply);
  repTA.addEventListener("input",e=>{S.dReply=e.target.value;});

  return h("div",{cls:"page"},
    hdr(c.id,()=>set({sel:null})),

    h("div",{style:{background:"var(--card)",border:`1.5px solid ${p.color}55`,borderRadius:"14px",padding:"20px",marginBottom:"14px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"10px"}},
        pill(p.label+" Priority",p.color,p.bg,true),
        pill(s.icon+" "+s.label,s.color,s.color+"22",true)
      ),
      h("div",{style:{fontSize:"16px",color:"var(--text)",marginTop:"14px",lineHeight:"1.7"}},c.summary||c.description),
      h("div",{style:{marginTop:"14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}},
        irow("Reporter",(c.role?`[${c.role}] `:"")+(c.name||"Anonymous")),
        irow("Contact",c.contact||"—"),
        irow("Location",c.location),
        irow("Category",cat?cat.icon+" "+cat.label:c.category),
        irow("Submitted",c.submittedAt),
        irow("Updated",c.updatedAt)
      ),
      c.safetyNote?h("div",{style:{marginTop:"12px",padding:"12px 14px",background:"#EF444422",border:"1px solid #EF4444",borderRadius:"10px",fontSize:"13px",color:"#FFCDD2"}},"⚠️ "+c.safetyNote):null,
      h("div",{style:{marginTop:"12px",padding:"12px 14px",background:"var(--bg)",borderRadius:"10px",fontSize:"13px",color:"var(--muted)",borderLeft:"3px solid var(--blue)"}},
        h("strong",{style:{color:"var(--accent)"}},"Full Description:"),h("br",{}),c.description
      )
    ),

    h("div",{cls:"acard"},
      sec("UPDATE STATUS & ASSIGNMENT"),
      h("div",{cls:"g2",style:{marginBottom:"14px"}},
        h("div",{},h("label",{cls:"lbl"},"STATUS"),stSel),
        h("div",{},h("label",{cls:"lbl"},"DEPARTMENT"),dpSel)
      ),
      h("button",{cls:"btn",onClick:async()=>{
        try{
          const now=new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"});
          await fbUpdate(c.docId||c.id,{status:S.dStatus,assignDept:S.dDept,updatedAt:now});
          S.sel={...c,status:S.dStatus,assignDept:S.dDept,updatedAt:now};
          toast("✅ Updated! All phones will see this now.");
          draw();
        }catch(e){toast("❌ Update failed. Check internet.","err");}
      }},"💾 Save Changes")
    ),

    h("div",{cls:"acard"},
      sec("REPLIES TO STUDENT / STAFF"),
      (c.replies||[]).length===0?h("div",{style:{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}},"No replies yet."):
        h("div",{},...(c.replies||[]).map(r=>h("div",{cls:"reply-item"},
          h("div",{style:{fontSize:"11px",color:"var(--muted)",marginBottom:"4px"}},r.by+" · "+r.at),
          h("div",{style:{fontSize:"14px",color:"var(--text)"}},r.text)
        ))),
      repTA,
      h("button",{cls:"btn",style:{background:"linear-gradient(135deg,#065F46,#047857)"},onClick:async()=>{
        if(!S.dReply.trim())return;
        const nr={text:S.dReply.trim(),by:"Management",at:new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"})};
        try{
          const updatedReplies=[...(c.replies||[]),nr];
          await fbUpdate(c.docId||c.id,{replies:updatedReplies,updatedAt:new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"})});
          S.sel={...c,replies:[...(c.replies||[]),nr]};
          S.dReply="";
          toast("✅ Reply sent! Student can see it now.");
          draw();
        }catch(e){toast("❌ Failed. Check internet.","err");}
      }},"📤 Send Reply")
    )
  );
}

// ════════════════════════════════════════════════════════════
//  TOAST EL
// ════════════════════════════════════════════════════════════
function toastEl(){
  if(!S.toast)return null;
  const ok=S.toast.type==="ok";
  return h("div",{cls:"toast",style:{background:ok?"#065F46":"#7F1D1D",border:`1px solid ${ok?"#10B981":"#EF4444"}`,color:ok?"#10B981":"#EF4444"}},(ok?"✅ ":"❌ ")+S.toast.msg);
}

// ════════════════════════════════════════════════════════════
//  MAIN DRAW
// ════════════════════════════════════════════════════════════
function draw(){
  const root=document.getElementById("root");
  root.innerHTML="";
  let page;
  switch(S.view){
    case"home":   page=pageHome();   break;
    case"submit": page=pageSubmit(); break;
    case"track":  page=pageTrack();  break;
    case"pingate":page=pagePinGate();break;
    case"admin":  page=S.adminOK?pageAdmin():pagePinGate();break;
    default:      page=pageHome();
  }
  root.appendChild(page);
  const t=toastEl();
  if(t)root.appendChild(t);
}

// ════════════════════════════════════════════════════════════
//  SERVICE WORKER — makes app installable
// ════════════════════════════════════════════════════════════
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

// ════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════
document.addEventListener("fb-ready",()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("root").style.display="block";
  startListener(); // start realtime sync
  draw();
});

// Fallback timeout
setTimeout(()=>{
  if(!window._sbReady){
    document.getElementById("loading").innerHTML=`
      <div style="font-size:40px">⚠️</div>
      <div style="color:#F59E0B;font-size:16px;font-weight:700;margin-top:12px">Connection Error</div>
      <div style="color:#64748B;font-size:13px;margin-top:8px;text-align:center;padding:0 30px">
        Check your internet connection and reload the page.
      </div>
    `;
  }
},8000);
</script>
</body>
</html>
